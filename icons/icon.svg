<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Fond bleu foncé avec coins arrondis -->
  <rect width="128" height="128" rx="24" fill="#1a3a6b"/>

  <!-- Symbole accessibilité modernisé (silhouette dynamique, bras levés) -->
  <!-- Tête -->
  <circle cx="64" cy="26" r="11" fill="#ffffff"/>

  <!-- Corps incliné vers l'avant -->
  <line x1="64" y1="37" x2="64" y2="75" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>

  <!-- Bras gauche levé -->
  <line x1="64" y1="50" x2="36" y2="34" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>

  <!-- Bras droit levé -->
  <line x1="64" y1="50" x2="92" y2="34" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>

  <!-- Jambe gauche -->
  <line x1="64" y1="75" x2="42" y2="102" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>

  <!-- Jambe droite -->
  <line x1="64" y1="75" x2="86" y2="102" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
</svg>
